apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: tanmaybenot/macnmanage-backend:IMAGE_TAG

          ports:
            - containerPort: 5000

          env:
            - name: PORT
              value: "5000"